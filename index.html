<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telegram Web Ultra</title>
    <style>
        :root {
            --tg-blue: #0088cc;
            --tg-bg: #e7ebf0;
            --tg-my-msg: #effdde;
            --tg-white: #ffffff;
            --tg-gray: #8e8e93;
            --tg-green: #4dbb5e;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto; background: var(--tg-bg); overflow: hidden; }

        /* ЭКРАН ВХОДА */
        #login-screen { position: fixed; inset: 0; background: var(--tg-blue); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; color: white; transition: 0.4s; }
        .logo-anim { font-size: 60px; margin-bottom: 20px; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        #login-screen input { padding: 15px; border-radius: 12px; border: none; width: 280px; font-size: 16px; outline: none; margin-bottom: 15px; text-align: center; }
        #login-screen button { padding: 12px 60px; border-radius: 12px; border: none; background: white; color: var(--tg-blue); font-weight: bold; cursor: pointer; font-size: 16px; }

        /* ОСНОВНОЙ ПЛЕЙС */
        #app-container { display: none; width: 100vw; height: 100vh; background: white; }

        /* СЕТКА: ПК (Side+Chat) / МОБИЛКА (Только Chat) */
        .layout { display: grid; grid-template-columns: 350px 1fr; width: 100%; height: 100%; }
        @media (max-width: 768px) { .layout { grid-template-columns: 1fr; } .sidebar { display: none; } }

        /* SIDEBAR */
        .sidebar { border-right: 1px solid #dfe5ec; display: flex; flex-direction: column; background: white; }
        .side-header { padding: 15px; display: flex; align-items: center; gap: 15px; background: white; border-bottom: 1px solid #f0f0f0; }
        .side-chat-item { padding: 12px 15px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.2s; }
        .side-chat-item:hover { background: #f4f4f5; }
        .side-chat-item.active { background: #419fd9; color: white; }

        /* CHAT AREA */
        .chat-view { display: flex; flex-direction: column; background: #c7d7e2 url("https://www.transparenttextures.com/patterns/cubes.png"); position: relative; height: 100%; }
        
        .chat-header { height: 60px; background: white; display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid #ddd; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .back-btn { display: none; margin-right: 15px; font-size: 20px; cursor: pointer; }
        @media (max-width: 768px) { .back-btn { display: block; } }

        #messages-list { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; padding-bottom: 90px; scroll-behavior: smooth; }

        /* СООБЩЕНИЯ */
        .msg-line { display: flex; align-items: flex-end; gap: 8px; max-width: 85%; animation: msgIn 0.2s ease-out; position: relative; }
        .msg-line.me { align-self: flex-end; flex-direction: row-reverse; }
        @keyframes msgIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .avatar { width: 38px; height: 38px; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; font-size: 14px; }
        
        .bubble { background: white; padding: 8px 12px; border-radius: 15px 15px 15px 5px; box-shadow: 0 1px 2px rgba(0,0,0,0.15); position: relative; min-width: 60px; transition: 0.2s; }
        .me .bubble { background: var(--tg-my-msg); border-radius: 15px 15px 5px 15px; }

        .reply-box-in-msg { background: rgba(0,0,0,0.05); border-left: 3px solid var(--tg-blue); padding: 4px 8px; margin-bottom: 5px; border-radius: 4px; font-size: 13px; }

        .bubble b { font-size: 12px; color: var(--tg-blue); display: block; margin-bottom: 3px; }
        .msg-img { max-width: 100%; border-radius: 10px; margin: 5px 0; cursor: pointer; display: block; max-height: 350px; }
        .msg-info { font-size: 10px; color: var(--tg-gray); text-align: right; display: block; margin-top: 2px; }
        .read-icon { color: var(--tg-green); margin-left: 3px; font-weight: bold; }

        /* ПАНЕЛЬ ОТВЕТА (REPLY BAR) */
        #reply-preview { display: none; background: #fff; border-left: 4px solid var(--tg-blue); padding: 10px 20px; position: absolute; bottom: 70px; left: 0; right: 0; z-index: 50; align-items: center; justify-content: space-between; }

        /* ВВОД */
        .input-wrap { position: absolute; bottom: 0; left: 0; right: 0; background: white; padding: 10px 15px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #ddd; z-index: 100; }
        #main-input { flex: 1; padding: 12px 18px; border-radius: 25px; border: 1px solid #eee; background: #f4f4f5; outline: none; font-size: 16px; }
        .btn-send { color: var(--tg-blue); font-size: 28px; cursor: pointer; border: none; background: none; transition: 0.2s; }
        .btn-send:hover { transform: scale(1.1); }

        /* VIEWER */
        #viewer { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; justify-content: center; align-items: center; }
        #viewer img { max-width: 100%; max-height: 100%; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="logo-anim">✈️</div>
        <h1>ViGram</h1>
        <input type="text" id="nick-input" placeholder="Введите никнейм..." maxlength="15">
        <button id="enter-btn">ПРОДОЛЖИТЬ</button>
    </div>

    <div id="viewer" onclick="this.style.display='none'"><img id="v-img"></div>

    <div id="app-container">
        <div class="layout">
            <div class="sidebar">
                <div class="side-header"><b>Telegram Web</b></div>
                <div class="side-chat-item active">
                    <div class="avatar" style="background: #ffa06d;">#</div>
                    <div>
                        <div style="font-weight:bold">Общий чат</div>
                        <div id="side-status" style="font-size:12px; opacity:0.8">в сети</div>
                    </div>
                </div>
            </div>

            <div class="chat-view">
                <div class="chat-header">
                    <div class="back-btn">⬅</div>
                    <div class="avatar" style="background: #248bcf; width:35px; height:35px; margin-right:10px;">V</div>
                    <div>
                        <b style="display:block">Общий чат</b>
                        <span id="header-status" style="font-size:12px; color:var(--tg-blue)">в сети</span>
                    </div>
                </div>

                <div id="messages-list"></div>

                <div id="reply-preview">
                    <div>
                        <b id="reply-user" style="color:var(--tg-blue); font-size:13px;"></b>
                        <div id="reply-text" style="font-size:12px; color:#555;"></div>
                    </div>
                    <span onclick="cancelReply()" style="cursor:pointer; font-size:20px;">&times;</span>
                </div>

                <div class="input-wrap">
                    <button style="background:none; border:none; font-size:20px; color:var(--tg-gray);">📎</button>
                    <input type="text" id="main-input" placeholder="Написать сообщение..." autocomplete="off">
                    <button id="send-btn" class="btn-send">➤</button>
                </div>
            </div>
        </div>
    </div>

    <audio id="snd" src="https://www.myinstants.com/media/sounds/telegram_notification.mp3"></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, onChildRemoved, serverTimestamp, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCq2JXG77N9vhOoM3q7bQrAubd-GcHrmPc",
            authDomain: "vigram-8027f.firebaseapp.com",
            projectId: "vigram-8027f",
            databaseURL: "https://vigram-8027f-default-rtdb.firebaseio.com",
            storageBucket: "vigram-8027f.firebasestorage.app",
            messagingSenderId: "901776482936",
            appId: "1:901776482936:web:330cc75882fde42a0e438d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const mRef = ref(db, 'messages');
        let myNick = "";
        let currentReply = null;

        const colors = ['#e57373', '#81c784', '#64b5f6', '#ffb74d', '#ba68c8', '#4db6ac'];

        // ВХОД
        document.getElementById('enter-btn').onclick = () => {
            const val = document.getElementById('nick-input').value.trim();
            if(val) {
                myNick = val;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-container').style.display = 'block';
            }
        };

        // ОТПРАВКА
        function sendMessage() {
            const inp = document.getElementById('main-input');
            const val = inp.value.trim();
            if(val) {
                push(mRef, {
                    user: myNick,
                    text: val,
                    replyTo: currentReply,
                    time: serverTimestamp()
                });
                inp.value = "";
                cancelReply();
            }
        }
        document.getElementById('send-btn').onclick = sendMessage;
        document.getElementById('main-input').onkeydown = (e) => { if(e.key === 'Enter') sendMessage(); };

        // ОТВЕТЫ
        window.setReply = (id, user, text) => {
            currentReply = { user, text: text.substring(0, 50) };
            document.getElementById('reply-user').innerText = user;
            document.getElementById('reply-text').innerText = text.substring(0, 50);
            document.getElementById('reply-preview').style.display = 'flex';
            document.getElementById('main-input').focus();
        };
        window.cancelReply = () => { currentReply = null; document.getElementById('reply-preview').style.display = 'none'; };

        // УДАЛЕНИЕ
        window.deleteMsg = (id, user) => {
            if(user === myNick && confirm("Удалить сообщение?")) remove(ref(db, 'messages/' + id));
        };

        // РЕНДЕР
        onChildAdded(mRef, (snap) => {
            const id = snap.key;
            const m = snap.val();
            const isMe = m.user === myNick;
            const date = m.time ? new Date(m.time) : new Date();
            const timeStr = date.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            const color = colors[Math.abs(m.user.split('').reduce((a,b)=>a+b.charCodeAt(0),0)) % colors.length];

            const line = document.createElement('div');
            line.className = `msg-line ${isMe ? 'me' : ''}`;
            line.id = "m-" + id;

            // Обработка медиа
            const imgMatch = m.text.match(/(https?:\/\/.*\.(?:png|jpg|jpeg|gif|webp))/i);
            const ytMatch = m.text.match(/(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/watch\?v=|youtu\.be\/)([\w-]{11})/);
            
            let media = "";
            if(imgMatch) media = `<img src="${imgMatch[0]}" class="msg-img" onclick="openFull('${imgMatch[0]}')">`;
            if(ytMatch) media = `<iframe style="width:100%; aspect-ratio:16/9; border-radius:8px; border:none; margin-top:5px;" src="https://www.youtube.com/embed/${ytMatch[1]}"></iframe>`;

            line.innerHTML = `
                ${!isMe ? `<div class="avatar" style="background:${color}">${m.user[0].toUpperCase()}</div>` : ''}
                <div class="bubble" oncontextmenu="event.preventDefault(); deleteMsg('${id}','${m.user}')" onclick="setReply('${id}','${m.user}','${m.text}')">
                    ${!isMe ? `<b>${m.user}</b>` : ''}
                    ${m.replyTo ? `<div class="reply-box-in-msg"><b>${m.replyTo.user}</b><br>${m.replyTo.text}</div>` : ''}
                    <div style="font-size:15px;">${m.text}</div>
                    ${media}
                    <span class="msg-info">${timeStr} ${isMe ? '<span class="read-icon">✓✓</span>' : ''}</span>
                </div>
            `;
            
            document.getElementById('messages-list').appendChild(line);
            document.getElementById('messages-list').scrollTop = document.getElementById('messages-list').scrollHeight;
            if(!isMe) document.getElementById('snd').play().catch(()=>{});
        });

        onChildRemoved(mRef, (snap) => {
            const el = document.getElementById("m-" + snap.key);
            if(el) el.remove();
        });

        // СТАТУС ПЕЧАТИ
        document.getElementById('main-input').oninput = () => {
            set(ref(db, 'typing/' + myNick), { a: true });
            clearTimeout(window.tyt);
            window.tyt = setTimeout(() => set(ref(db, 'typing/' + myNick), null), 1500);
        };
        onValue(ref(db, 'typing'), (s) => {
            const data = s.val() || {};
            const typers = Object.keys(data).filter(u => u !== myNick);
            const status = typers.length ? typers.join(', ') + ' печатает...' : 'в сети';
            document.getElementById('header-status').innerText = status;
            document.getElementById('side-status').innerText = status;
        });

        window.openFull = (url) => { document.getElementById('v-img').src = url; document.getElementById('viewer').style.display = 'flex'; };
    </script>
</body>
</html>
