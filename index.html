<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViGram Ultra Fixed</title>
    <style>
        :root {
            --tg-blue: #248bcf;
            --tg-bg: #e6eff5;
            --tg-my-msg: #effdde;
            --tg-text: #222;
            --tg-gray: #8e8e93;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--tg-bg); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        /* Фон как в ТГ (паттерн на CSS) */
        #messages { 
            flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; 
            background-color: #7da0ca;
            background-image: url("https://www.transparenttextures.com/patterns/cubes.png"); /* Легкий паттерн */
        }

        #login-screen { position: fixed; inset: 0; background: var(--tg-blue); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; color: white; transition: 0.3s; }
        #login-screen input { padding: 15px; border-radius: 12px; border: none; width: 280px; margin-bottom: 15px; outline: none; color: #333; }
        #login-screen button { padding: 12px 40px; border-radius: 12px; border: none; background: white; color: var(--tg-blue); font-weight: bold; cursor: pointer; font-size: 16px; }

        #app { width: 100%; max-width: 500px; background: white; height: 100vh; display: none; flex-direction: column; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        
        header { background: var(--tg-blue); color: white; padding: 10px 15px; display: flex; align-items: center; gap: 15px; z-index: 5; }
        .header-info { display: flex; flex-direction: column; }
        .header-info .status { font-size: 12px; opacity: 0.8; }

        /* Сообщения */
        .message-wrapper { display: flex; align-items: flex-end; gap: 8px; max-width: 85%; margin-bottom: 4px; position: relative; }
        .my-wrapper { align-self: flex-end; flex-direction: row-reverse; }

        .avatar { width: 35px; height: 35px; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; flex-shrink: 0; }

        .message { background: white; padding: 8px 12px; border-radius: 15px 15px 15px 5px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); position: relative; min-width: 60px; }
        .my-message { background: var(--tg-my-msg); border-radius: 15px 15px 5px 15px; }
        
        .user-name { font-size: 12px; font-weight: bold; color: var(--tg-blue); margin-bottom: 2px; }
        
        /* Картинки в сообщениях */
        .message-img { max-width: 100%; max-height: 250px; border-radius: 8px; margin-top: 5px; cursor: pointer; display: block; transition: 0.2s; }
        .message-img:hover { filter: brightness(0.9); }

        .msg-meta { font-size: 10px; color: var(--tg-gray); margin-top: 4px; display: flex; justify-content: flex-end; align-items: center; gap: 3px; }

        /* Просмотрщик изображений (НА ВЕСЬ ЭКРАН) */
        #image-viewer { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; 
            justify-content: center; align-items: center; cursor: pointer; 
        }
        #image-viewer img { max-width: 95vw; max-height: 95vh; border-radius: 5px; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        #close-viewer { position: absolute; top: 20px; right: 20px; color: white; font-size: 30px; font-weight: bold; cursor: pointer; }

        /* Ввод */
        .input-area { padding: 10px; background: white; border-top: 1px solid #ddd; }
        .controls { display: flex; align-items: center; gap: 10px; }
        #message-input { flex: 1; padding: 12px; border: 1px solid #eee; background: #f4f4f5; border-radius: 20px; outline: none; font-size: 15px; }
        .btn-icon { background: none; border: none; color: var(--tg-blue); font-size: 24px; cursor: pointer; padding: 0; transition: 0.2s; }
        .btn-icon:hover { transform: scale(1.1); }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="font-size: 48px; margin-bottom: 10px;">ViGram</h1>
        <p style="margin-bottom: 30px; opacity: 0.9;">Введите ваше имя для входа</p>
        <input type="text" id="username-input" placeholder="Ваше имя..." maxlength="15">
        <button id="start-btn">ПРОДОЛЖИТЬ</button>
    </div>

    <div id="image-viewer" onclick="this.style.display='none'">
        <span id="close-viewer">&times;</span>
        <img id="full-image" src="">
    </div>

    <div id="app">
        <header>
            <div class="avatar" style="background: white; color: var(--tg-blue);">V</div>
            <div class="header-info">
                <span>Общий чат</span>
                <span class="status" id="typing-status">в сети</span>
            </div>
        </header>

        <div id="messages"></div>

        <div class="input-area">
            <div class="controls">
                <input type="text" id="message-input" placeholder="Сообщение или ссылка на фото..." autocomplete="off">
                <button id="send-btn" class="btn-icon">➤</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, serverTimestamp, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCq2JXG77N9vhOoM3q7bQrAubd-GcHrmPc",
            authDomain: "vigram-8027f.firebaseapp.com",
            projectId: "vigram-8027f",
            databaseURL: "https://vigram-8027f-default-rtdb.firebaseio.com",
            storageBucket: "vigram-8027f.firebasestorage.app",
            messagingSenderId: "901776482936",
            appId: "1:901776482936:web:330cc75882fde42a0e438d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const messagesRef = ref(db, 'messages');

        let myName = "";
        const colors = ['#E57373', '#81C784', '#64B5F6', '#FFD54F', '#BA68C8', '#4DB6AC'];

        // Вход
        document.getElementById('start-btn').onclick = () => {
            const val = document.getElementById('username-input').value.trim();
            if(val) {
                myName = val;
                document.getElementById('login-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('login-screen').style.display='none';
                    document.getElementById('app').style.display='flex';
                }, 300);
            }
        };

        // Логика просмотра фото (window. чтобы работало в динамическом HTML)
        window.openPhoto = (url) => {
            const fullImg = document.getElementById('full-image');
            const viewer = document.getElementById('image-viewer');
            fullImg.src = url;
            viewer.style.display = 'flex';
        };

        function getAvatarColor(name) {
            let hash = 0;
            for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
            return colors[Math.abs(hash) % colors.length];
        }

        // Отправка (просто текст)
        function send() {
            const input = document.getElementById('message-input');
            if(input.value.trim()) {
                push(messagesRef, {
                    user: myName,
                    text: input.value.trim(),
                    time: serverTimestamp()
                });
                input.value = "";
            }
        }
        document.getElementById('send-btn').onclick = send;
        document.getElementById('message-input').onkeypress = (e) => e.key === 'Enter' && send();

        // Рендер
        onChildAdded(messagesRef, (snap) => {
            const m = snap.val();
            const isMe = m.user === myName;
            const wrap = document.createElement('div');
            wrap.className = `message-wrapper ${isMe ? 'my-wrapper' : ''}`;
            
            const date = m.time ? new Date(m.time) : new Date();
            const time = date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            
            // ЛОГИКА ОПРЕДЕЛЕНИЯ ИЗОБРАЖЕНИЯ (ПРЯМО В КОДЕ)
            const textContent = m.text.trim();
            // Регулярное выражение для поиска ссылки в конце сообщения
            const imgRegex = /(https?:\/\/.*\.(?:png|jpg|jpeg|gif|webp))/i;
            const match = textContent.match(imgRegex);

            let contentHtml = '';
            if (match) {
                // Если ссылка найдена, отображаем картинку
                const imgUrl = match[0];
                // Убираем ссылку из текста, если она там одна
                const cleanText = textContent.replace(imgUrl, '').trim();
                contentHtml = `
                    ${cleanText ? `<div>${cleanText}</div>` : ''}
                    <img src="${imgUrl}" class="message-img" onclick="openPhoto('${imgUrl}')" onerror="this.onerror=null; this.src='https://placehold.co/200x150?text=Ошибка+загрузки';">
                `;
            } else {
                // Обычный текст
                contentHtml = `<div>${textContent}</div>`;
            }

            wrap.innerHTML = `
                ${!isMe ? `<div class="avatar" style="background:${getAvatarColor(m.user)}">${m.user[0].toUpperCase()}</div>` : ''}
                <div class="message ${isMe ? 'my-message' : ''}">
                    ${!isMe ? `<div class="user-name">${m.user}</div>` : ''}
                    ${contentHtml}
                    <div class="msg-meta">${time} ${isMe ? '<span style="color:#4fc3f7; margin-left:4px">✔✔</span>' : ''}</div>
                </div>
            `;
            const container = document.getElementById('messages');
            container.appendChild(wrap);
            container.scrollTop = container.scrollHeight;
        });

        // Статус печати
        document.getElementById('message-input').oninput = () => {
            set(ref(db, 'typing/' + myName), { typing: true });
            clearTimeout(window.t);
            window.t = setTimeout(() => set(ref(db, 'typing/' + myName), { typing: false }), 2000);
        };
        onValue(ref(db, 'typing'), (s) => {
            const data = s.val() || {};
            const names = Object.keys(data).filter(n => data[n].typing && n !== myName);
            document.getElementById('typing-status').innerText = names.length ? names.join(', ') + ' печатает...' : 'в сети';
        });
    </script>
</body>
</html>
