<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViGram Online</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #e6eff5; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #app { width: 100%; max-width: 450px; background: white; height: 95vh; display: flex; flex-direction: column; box-shadow: 0 5px 25px rgba(0,0,0,0.2); border-radius: 15px; overflow: hidden; }
        header { background: #248bcf; color: white; padding: 20px; font-size: 22px; font-weight: bold; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background-color: #f7f9fa; }
        .message { background: white; padding: 10px 15px; border-radius: 18px; align-self: flex-start; max-width: 75%; box-shadow: 0 1px 2px rgba(0,0,0,0.1); font-size: 16px; line-height: 1.4; color: #333; }
        .my-message { align-self: flex-end; background: #effdde; color: #000; }
        .input-area { display: flex; padding: 15px; border-top: 1px solid #eee; background: white; }
        #message-input { flex: 1; padding: 12px 18px; border: 1px solid #ddd; border-radius: 25px; outline: none; font-size: 16px; }
        #send-btn { background: #248bcf; color: white; border: none; width: 50px; height: 45px; margin-left: 10px; border-radius: 50%; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        #send-btn:hover { background: #1e74ad; transform: scale(1.05); }
    </style>
</head>
<body>
    <div id="app">
        <header>ViGram Chat</header>
        <div id="messages"></div>
        <div class="input-area">
            <input type="text" id="message-input" placeholder="Написать сообщение..." autocomplete="off">
            <button id="send-btn">➤</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // ТВОИ НАСТРОЙКИ FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyCq2JXG77N9vhOoM3q7bQrAubd-GcHrmPc",
            authDomain: "vigram-8027f.firebaseapp.com",
            projectId: "vigram-8027f",
            databaseURL: "https://vigram-8027f-default-rtdb.firebaseio.com",
            storageBucket: "vigram-8027f.firebasestorage.app",
            messagingSenderId: "901776482936",
            appId: "1:901776482936:web:330cc75882fde42a0e438d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const messagesRef = ref(db, 'messages');

        const sendBtn = document.getElementById('send-btn');
        const messageInput = document.getElementById('message-input');
        const messagesDiv = document.getElementById('messages');

        // Отправка сообщения
        function sendMessage() {
            const text = messageInput.value.trim();
            if (text !== "") {
                push(messagesRef, {
                    text: text,
                    time: serverTimestamp()
                });
                messageInput.value = "";
            }
        }

        sendBtn.onclick = sendMessage;
        messageInput.onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };

        // Слушаем новые сообщения в реальном времени
        onChildAdded(messagesRef, (data) => {
            const msg = data.val();
            const msgElement = document.createElement('div');
            msgElement.className = 'message';
            msgElement.textContent = msg.text;
            
            messagesDiv.appendChild(msgElement);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        });
    </script>
</body>
</html>
