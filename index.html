<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViGram Desktop</title>
    <style>
        :root {
            --tg-blue: #248bcf;
            --tg-bg: #e6eff5;
            --tg-my-msg: #effdde;
            --tg-white: #ffffff;
            --tg-gray: #8e8e93;
            --tg-border: #dfe5ec;
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Segoe UI', Roboto, sans-serif; background-color: var(--tg-bg); overflow: hidden; }
        
        /* Экран входа */
        #login-screen { position: fixed; inset: 0; background: var(--tg-blue); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; color: white; }
        #login-screen input { padding: 15px; border-radius: 10px; border: none; width: 300px; margin-bottom: 15px; font-size: 16px; outline: none; }
        #login-screen button { padding: 12px 50px; border-radius: 10px; border: none; background: white; color: var(--tg-blue); font-weight: bold; cursor: pointer; font-size: 16px; }

        /* Макет для ПК */
        #main-container { display: none; width: 100vw; height: 100vh; grid-template-columns: 350px 1fr; background: var(--tg-white); }

        /* Левая панель (Контакты) */
        .sidebar { border-right: 1px solid var(--tg-border); display: flex; flex-direction: column; background: var(--tg-white); }
        .sidebar-header { padding: 20px; background: var(--tg-blue); color: white; font-weight: bold; font-size: 18px; }
        .contact-item { padding: 15px 20px; display: flex; align-items: center; gap: 15px; background: #f1f9ff; border-bottom: 1px solid #f0f0f0; cursor: pointer; }
        .contact-info b { display: block; color: #222; }
        .contact-info span { font-size: 13px; color: var(--tg-blue); }

        /* Окно чата */
        .chat-area { display: flex; flex-direction: column; background-color: #7da0ca; background-image: url("https://www.transparenttextures.com/patterns/cubes.png"); position: relative; }
        
        .chat-header { height: 60px; background: var(--tg-white); display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid var(--tg-border); z-index: 10; }
        
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }

        /* Сообщения */
        .message-wrapper { display: flex; align-items: flex-end; gap: 10px; max-width: 70%; margin-bottom: 5px; }
        .my-wrapper { align-self: flex-end; flex-direction: row-reverse; }

        .avatar { width: 40px; height: 40px; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; }

        .message { background: var(--tg-white); padding: 10px 15px; border-radius: 12px 12px 12px 3px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); position: relative; }
        .my-message { background: var(--tg-my-msg); border-radius: 12px 12px 3px 12px; }
        
        .user-name { font-size: 13px; font-weight: bold; color: var(--tg-blue); margin-bottom: 4px; }
        .message-img { max-width: 100%; max-height: 400px; border-radius: 8px; margin-top: 8px; cursor: zoom-in; display: block; }

        .msg-meta { font-size: 11px; color: var(--tg-gray); margin-top: 5px; display: flex; justify-content: flex-end; align-items: center; gap: 5px; }

        /* Поле ввода */
        .input-container { background: var(--tg-white); padding: 15px 30px; display: flex; flex-direction: column; gap: 10px; border-top: 1px solid var(--tg-border); }
        .emoji-row { display: flex; gap: 15px; font-size: 22px; }
        .emoji-row span { cursor: pointer; transition: 0.2s; }
        .emoji-row span:hover { transform: scale(1.3); }

        .input-row { display: flex; align-items: center; gap: 15px; }
        #message-input { flex: 1; padding: 12px 20px; border: 1px solid #eee; background: #f4f4f5; border-radius: 25px; outline: none; font-size: 16px; }
        
        #send-btn { background: none; border: none; color: var(--tg-blue); font-size: 30px; cursor: pointer; }

        /* Просмотр фото */
        #viewer { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 20000; justify-content: center; align-items: center; cursor: pointer; }
        #viewer img { max-width: 90%; max-height: 90%; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1>ViGram Desktop</h1>
        <input type="text" id="username-input" placeholder="Введите ваш ник...">
        <button id="start-btn">Начать общение</button>
    </div>

    <div id="viewer" onclick="this.style.display='none'"><img id="full-img"></div>

    <div id="main-container">
        <div class="sidebar">
            <div class="sidebar-header">ViGram</div>
            <div class="contact-item">
                <div class="avatar" style="background: #ffa06d;">#</div>
                <div class="contact-info">
                    <b>Общий чат</b>
                    <span id="typing-status">в сети</span>
                </div>
            </div>
        </div>

        <div class="chat-area">
            <div class="chat-header">
                <b id="chat-title">Общий чат</b>
            </div>
            
            <div id="messages"></div>

            <div class="input-container">
                <div class="emoji-row">
                    <span>😊</span><span>😂</span><span>🔥</span><span>👍</span><span>❤️</span><span>😎</span><span>😡</span><span>🖼️</span>
                </div>
                <div class="input-row">
                    <input type="text" id="message-input" placeholder="Напишите сообщение или вставьте ссылку на фото..." autocomplete="off">
                    <button id="send-btn">➤</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, serverTimestamp, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCq2JXG77N9vhOoM3q7bQrAubd-GcHrmPc",
            authDomain: "vigram-8027f.firebaseapp.com",
            projectId: "vigram-8027f",
            databaseURL: "https://vigram-8027f-default-rtdb.firebaseio.com",
            storageBucket: "vigram-8027f.firebasestorage.app",
            messagingSenderId: "901776482936",
            appId: "1:901776482936:web:330cc75882fde42a0e438d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const messagesRef = ref(db, 'messages');

        let myName = "";
        const colors = ['#e57373', '#81c784', '#64b5f6', '#ffb74d', '#ba68c8', '#4db6ac'];

        // Вход
        document.getElementById('start-btn').onclick = () => {
            const val = document.getElementById('username-input').value.trim();
            if(val) {
                myName = val;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-container').style.display = 'grid';
            }
        };

        // Смайлики
        document.querySelectorAll('.emoji-row span').forEach(el => {
            el.onclick = () => {
                if(el.innerText === '🖼️') {
                    const url = prompt("Вставьте прямую ссылку на фото (должна заканчиваться на .jpg, .png, .gif):");
                    if(url) document.getElementById('message-input').value = url;
                } else {
                    document.getElementById('message-input').value += el.innerText;
                }
                document.getElementById('message-input').focus();
            };
        });

        // Отправка
        function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if(text) {
                push(messagesRef, { user: myName, text: text, time: serverTimestamp() });
                input.value = "";
            }
        }
        document.getElementById('send-btn').onclick = sendMessage;
        document.getElementById('message-input').onkeypress = (e) => e.key === 'Enter' && sendMessage();

        // Рендер сообщений
        onChildAdded(messagesRef, (snap) => {
            const m = snap.val();
            const isMe = m.user === myName;
            const wrap = document.createElement('div');
            wrap.className = `message-wrapper ${isMe ? 'my-wrapper' : ''}`;
            
            const time = m.time ? new Date(m.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '--:--';
            const color = colors[Math.abs(m.user.split('').reduce((a,b)=>a+b.charCodeAt(0),0)) % colors.length];

            // Проверка на картинку
            const imgRegex = /(https?:\/\/.*\.(?:png|jpg|jpeg|gif|webp))/i;
            const match = m.text.match(imgRegex);
            
            let content = match 
                ? `<img src="${match[0]}" class="message-img" onclick="viewImg('${match[0]}')" onerror="this.src='https://placehold.co/300x200?text=Ошибка:+непрямая+ссылка'">`
                : `<div>${m.text}</div>`;

            wrap.innerHTML = `
                ${!isMe ? `<div class="avatar" style="background:${color}">${m.user[0].toUpperCase()}</div>` : ''}
                <div class="message ${isMe ? 'my-message' : ''}">
                    ${!isMe ? `<div class="user-name">${m.user}</div>` : ''}
                    ${content}
                    <div class="msg-meta">${time} ${isMe ? '<span>✔✔</span>' : ''}</div>
                </div>
            `;
            document.getElementById('messages').appendChild(wrap);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        });

        window.viewImg = (url) => {
            document.getElementById('full-img').src = url;
            document.getElementById('viewer').style.display = 'flex';
        };

        // Статус печати
        document.getElementById('message-input').oninput = () => {
            set(ref(db, 'typing/' + myName), { typing: true });
            clearTimeout(window.t);
            window.t = setTimeout(() => set(ref(db, 'typing/' + myName), { typing: false }), 2000);
        };
        onValue(ref(db, 'typing'), (s) => {
            const data = s.val() || {};
            const names = Object.keys(data).filter(n => data[n].typing && n !== myName);
            document.getElementById('typing-status').innerText = names.length ? names.join(', ') + ' печатает...' : 'в сети';
        });
    </script>
</body>
</html>
