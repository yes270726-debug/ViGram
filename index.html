<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViGram Stable</title>
    <style>
        :root {
            --tg-blue: #248bcf;
            --tg-bg: #e6eff5;
            --tg-my-msg: #effdde;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--tg-bg); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        /* Логин */
        #login-screen { position: fixed; inset: 0; background: var(--tg-blue); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; color: white; }
        #login-screen input { padding: 12px; border-radius: 8px; border: none; width: 250px; margin-bottom: 10px; font-size: 16px; }
        #login-screen button { padding: 10px 30px; border-radius: 8px; border: none; background: white; color: var(--tg-blue); font-weight: bold; cursor: pointer; }

        /* Чат */
        #app { width: 100%; max-width: 450px; height: 95vh; background: white; display: none; flex-direction: column; box-shadow: 0 5px 20px rgba(0,0,0,0.1); border-radius: 10px; overflow: hidden; }
        
        header { background: var(--tg-blue); color: white; padding: 15px; display: flex; align-items: center; gap: 10px; font-weight: bold; }
        
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; background: #7da0ca url("https://www.transparenttextures.com/patterns/cubes.png"); }
        
        .msg-wrap { display: flex; align-items: flex-end; gap: 8px; max-width: 85%; }
        .is-me { align-self: flex-end; flex-direction: row-reverse; }

        .avatar { width: 35px; height: 35px; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; flex-shrink: 0; }
        
        .bubble { background: white; padding: 8px 12px; border-radius: 12px 12px 12px 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); position: relative; word-break: break-word; }
        .is-me .bubble { background: var(--tg-my-msg); border-radius: 12px 12px 4px 12px; }

        .u-name { font-size: 11px; font-weight: bold; color: var(--tg-blue); margin-bottom: 2px; display: block; }
        .msg-meta { font-size: 10px; color: #8e8e93; text-align: right; margin-top: 4px; display: block; }

        /* Ввод */
        .input-area { padding: 15px; background: white; border-top: 1px solid #ddd; display: flex; gap: 10px; align-items: center; }
        #message-input { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ddd; outline: none; background: #f4f4f5; }
        #send-btn { background: none; border: none; color: var(--tg-blue); font-size: 24px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2>ViGram</h2>
        <input type="text" id="username-input" placeholder="Ваше имя...">
        <button id="start-btn">ВОЙТИ</button>
    </div>

    <div id="app">
        <header>Общий чат</header>
        <div id="messages"></div>
        <div class="input-area">
            <input type="text" id="message-input" placeholder="Сообщение..." autocomplete="off">
            <button id="send-btn">➤</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCq2JXG77N9vhOoM3q7bQrAubd-GcHrmPc",
            authDomain: "vigram-8027f.firebaseapp.com",
            projectId: "vigram-8027f",
            databaseURL: "https://vigram-8027f-default-rtdb.firebaseio.com",
            storageBucket: "vigram-8027f.firebasestorage.app",
            messagingSenderId: "901776482936",
            appId: "1:901776482936:web:330cc75882fde42a0e438d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const messagesRef = ref(db, 'messages');

        let myName = "";
        const colors = ['#e57373', '#81c784', '#64b5f6', '#ffb74d', '#ba68c8'];

        document.getElementById('start-btn').onclick = () => {
            const val = document.getElementById('username-input').value.trim();
            if(val) {
                myName = val;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
            }
        };

        function sendMessage() {
            const input = document.getElementById('message-input');
            if(input.value.trim()) {
                push(messagesRef, { user: myName, text: input.value, time: serverTimestamp() });
                input.value = "";
            }
        }

        document.getElementById('send-btn').onclick = sendMessage;
        document.getElementById('message-input').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };

        onChildAdded(messagesRef, (snap) => {
            const m = snap.val();
            const isMe = m.user === myName;
            const wrap = document.createElement('div');
            wrap.className = `msg-wrap ${isMe ? 'is-me' : ''}`;
            
            const time = m.time ? new Date(m.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '';
            const color = colors[Math.abs(m.user.split('').reduce((a,b)=>a+b.charCodeAt(0),0)) % colors.length];

            wrap.innerHTML = `
                ${!isMe ? `<div class="avatar" style="background:${color}">${m.user[0].toUpperCase()}</div>` : ''}
                <div class="bubble">
                    ${!isMe ? `<span class="u-name">${m.user}</span>` : ''}
                    <div>${m.text}</div>
                    <span class="msg-meta">${time}</span>
                </div>
            `;
            document.getElementById('messages').appendChild(wrap);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        });
    </script>
</body>
</html>
