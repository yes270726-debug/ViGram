<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViGram Pro</title>
    <style>
        :root {
            --tg-blue: #248bcf;
            --tg-bg: #e6eff5;
            --tg-my-msg: #effdde;
            --tg-text: #222;
            --tg-gray: #8e8e93;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--tg-bg); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        /* Логин */
        #login-screen { position: fixed; inset: 0; background: var(--tg-blue); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; color: white; transition: 0.3s; }
        #login-screen input { padding: 15px; border-radius: 12px; border: none; width: 280px; font-size: 16px; margin-bottom: 15px; outline: none; color: #333; }
        #login-screen button { padding: 12px 40px; border-radius: 12px; border: none; background: white; color: var(--tg-blue); font-weight: bold; cursor: pointer; font-size: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }

        /* Основное окно */
        #app { width: 100%; max-width: 500px; background: white; height: 100vh; display: none; flex-direction: column; position: relative; }
        
        header { background: var(--tg-blue); color: white; padding: 10px 15px; display: flex; align-items: center; gap: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 5; }
        .header-info { display: flex; flex-direction: column; }
        .header-info .status { font-size: 12px; opacity: 0.8; font-weight: normal; }

        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-attachment: fixed; }
        
        /* Сообщения */
        .message-wrapper { display: flex; align-items: flex-end; gap: 8px; max-width: 85%; }
        .my-wrapper { align-self: flex-end; flex-direction: row-reverse; }

        .avatar { width: 35px; height: 35px; border-radius: 50%; background: #ffa06d; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; flex-shrink: 0; }

        .message { background: white; padding: 6px 10px 6px 12px; border-radius: 15px 15px 15px 5px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); position: relative; min-width: 60px; }
        .my-message { background: var(--tg-my-msg); border-radius: 15px 15px 5px 15px; }
        
        .user-name { font-size: 12px; font-weight: bold; color: var(--tg-blue); margin-bottom: 2px; }
        .text { font-size: 15px; color: var(--tg-text); line-height: 1.4; word-break: break-word; margin-right: 40px; }
        
        .msg-meta { position: absolute; bottom: 4px; right: 8px; font-size: 10px; color: var(--tg-gray); display: flex; align-items: center; gap: 3px; }

        /* Ввод */
        .input-area { padding: 10px; background: white; border-top: 1px solid #ddd; }
        .controls { display: flex; align-items: center; gap: 10px; }
        #message-input { flex: 1; padding: 10px 15px; border: 1px solid #eee; background: #f4f4f5; border-radius: 20px; outline: none; font-size: 15px; }
        #send-btn { background: none; border: none; color: var(--tg-blue); font-size: 24px; cursor: pointer; padding: 0; transition: 0.2s; }
        #send-btn:hover { transform: scale(1.1); }

        .emoji-bar { display: flex; gap: 12px; padding: 5px 10px; font-size: 18px; }
        .emoji { cursor: pointer; opacity: 0.8; transition: 0.2s; }
        .emoji:hover { opacity: 1; transform: scale(1.2); }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="font-size: 48px; margin-bottom: 10px;">ViGram</h1>
        <p style="margin-bottom: 30px; opacity: 0.9;">Введите ваше имя для входа</p>
        <input type="text" id="username-input" placeholder="Ваше имя..." maxlength="15">
        <button id="start-btn">ПРОДОЛЖИТЬ</button>
    </div>

    <div id="app">
        <header>
            <div class="avatar" id="header-avatar" style="background: #fff; color: var(--tg-blue);">V</div>
            <div class="header-info">
                <span>Общий чат</span>
                <span class="status" id="typing-status">в сети</span>
            </div>
        </header>

        <div id="messages"></div>

        <div class="input-area">
            <div class="emoji-bar">
                <span class="emoji">👍</span><span class="emoji">❤️</span><span class="emoji">😂</span><span class="emoji">😮</span><span class="emoji">😡</span><span class="emoji">🙏</span>
            </div>
            <div class="controls">
                <input type="text" id="message-input" placeholder="Сообщение" autocomplete="off">
                <button id="send-btn">➤</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, serverTimestamp, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCq2JXG77N9vhOoM3q7bQrAubd-GcHrmPc",
            authDomain: "vigram-8027f.firebaseapp.com",
            projectId: "vigram-8027f",
            databaseURL: "https://vigram-8027f-default-rtdb.firebaseio.com",
            storageBucket: "vigram-8027f.firebasestorage.app",
            messagingSenderId: "901776482936",
            appId: "1:901776482936:web:330cc75882fde42a0e438d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const messagesRef = ref(db, 'messages');
        const typingRef = ref(db, 'typing');

        let myName = "";
        const colors = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4', '#ffeead', '#ff9f43', '#a55eea'];

        // Вход
        document.getElementById('start-btn').onclick = () => {
            const input = document.getElementById('username-input').value.trim();
            if(input) {
                myName = input;
                document.getElementById('login-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('app').style.display = 'flex';
                }, 300);
            }
        };

        // Статус "Печатает..."
        const messageInput = document.getElementById('message-input');
        messageInput.oninput = () => {
            set(ref(db, 'typing/' + myName), { isTyping: true });
            clearTimeout(window.typingTimer);
            window.typingTimer = setTimeout(() => {
                set(ref(db, 'typing/' + myName), { isTyping: false });
            }, 2000);
        };

        onValue(typingRef, (snapshot) => {
            const data = snapshot.val();
            let typingUsers = [];
            for (let user in data) {
                if (data[user].isTyping && user !== myName) typingUsers.push(user);
            }
            document.getElementById('typing-status').innerText = 
                typingUsers.length > 0 ? typingUsers.join(', ') + ' печатает...' : 'в сети';
        });

        // Смайлики
        document.querySelectorAll('.emoji').forEach(emoji => {
            emoji.onclick = () => { messageInput.value += emoji.innerText; messageInput.focus(); };
        });

        // Форматирование времени
        function formatTime(ts) {
            const date = ts ? new Date(ts) : new Date();
            return date.getHours() + ':' + String(date.getMinutes()).padStart(2, '0');
        }

        // Цвет аватара
        function getAvatarColor(name) {
            let hash = 0;
            for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
            return colors[Math.abs(hash) % colors.length];
        }

        // Отправка
        function sendMessage() {
            const text = messageInput.value.trim();
            if (text !== "") {
                push(messagesRef, {
                    user: myName,
                    text: text,
                    time: serverTimestamp()
                });
                messageInput.value = "";
                set(ref(db, 'typing/' + myName), { isTyping: false });
            }
        }

        document.getElementById('send-btn').onclick = sendMessage;
        messageInput.onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };

        // Отрисовка сообщения
        onChildAdded(messagesRef, (data) => {
            const msg = data.val();
            const isMe = msg.user === myName;
            
            const wrapper = document.createElement('div');
            wrapper.className = `message-wrapper ${isMe ? 'my-wrapper' : ''}`;
            
            const avatarHtml = isMe ? '' : `<div class="avatar" style="background:${getAvatarColor(msg.user)}">${msg.user[0].toUpperCase()}</div>`;
            
            wrapper.innerHTML = `
                ${avatarHtml}
                <div class="message ${isMe ? 'my-message' : ''}">
                    ${isMe ? '' : `<span class="user-name">${msg.user}</span>`}
                    <div class="text">${msg.text}</div>
                    <div class="msg-meta">
                        ${formatTime(msg.time)}
                        ${isMe ? '<span style="color:#4fc3f7">✔✔</span>' : ''}
                    </div>
                </div>
            `;
            
            const container = document.getElementById('messages');
            container.appendChild(wrapper);
            container.scrollTop = container.scrollHeight;
        });
    </script>
</body>
</html>
