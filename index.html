<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ViGram Web</title>
    <style>
        /* Стили сразу добавим сюда, чтобы не создавать много файлов */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #e6eff5; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #app { width: 100%; max-width: 450px; background: white; height: 90vh; display: flex; flex-direction: column; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-radius: 10px; overflow: hidden; }
        header { background: #248bcf; color: white; padding: 15px; font-size: 20px; font-weight: bold; text-align: center; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background-image: url('https://www.transparenttextures.com/patterns/cubes.png'); }
        .message { background: #effdde; padding: 10px 15px; border-radius: 15px; align-self: flex-start; max-width: 80%; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .input-area { display: flex; padding: 15px; border-top: 1px solid #eee; background: white; }
        #message-input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 20px; outline: none; }
        #send-btn { background: #248bcf; color: white; border: none; padding: 10px 20px; margin-left: 10px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        #send-btn:hover { background: #1e74ad; }
    </style>
</head>
<body>
    <div id="app">
        <header>ViGram</header>
        <div id="messages">
            <div class="message">Добро пожаловать в ViGram! Напиши что-нибудь...</div>
        </div>
        <div class="input-area">
            <input type="text" id="message-input" placeholder="Сообщение...">
            <button id="send-btn">➤</button>
        </div>
    </div>

    <script>
        // Логика чата
        const sendBtn = document.getElementById('send-btn');
        const messageInput = document.getElementById('message-input');
        const messagesDiv = document.getElementById('messages');

        function sendMessage() {
            const text = messageInput.value.trim();
            if (text !== "") {
                const msgElement = document.createElement('div');
                msgElement.className = 'message';
                msgElement.textContent = text;
                msgElement.style.alignSelf = 'flex-end'; // Твои сообщения справа
                msgElement.style.background = '#e1f5fe';
                messagesDiv.appendChild(msgElement);
                messageInput.value = "";
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            }
        }

        sendBtn.onclick = sendMessage;
        messageInput.onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
    </script>
</body>
</html>
